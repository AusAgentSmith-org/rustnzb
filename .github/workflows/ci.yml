name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["*.md", "docs/**", "AGENTS.md", "CONTRIBUTING.md", "SECURITY.md"]
  pull_request:
    paths-ignore: ["*.md", "docs/**", "AGENTS.md", "CONTRIBUTING.md", "SECURITY.md"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    # Dependabot PRs update dependency metadata only; avoid consuming a
    # self-hosted runner for every automated update. Skipped jobs report a
    # successful check, so required checks do not remain pending.
    if: github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot'
    runs-on: [self-hosted, node-b, linux, x64, rust]
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          components: rustfmt,clippy
      - run: cargo fmt --all --check
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  frontend:
    if: github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot'
    runs-on: [self-hosted, node-b, linux, x64, rust]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/rustnzb/frontend/package-lock.json
      - working-directory: apps/rustnzb/frontend
        run: npm ci --no-audit --no-fund
      - working-directory: apps/rustnzb/frontend
        run: npm test -- --watch=false
      - working-directory: apps/rustnzb/frontend
        run: npm run build -- --configuration=production
