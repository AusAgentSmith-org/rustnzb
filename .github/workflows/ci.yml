name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: rustnzb-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt-clippy-test:
    runs-on: [self-hosted, rustnzb]
    timeout-minutes: 45
    env:
      RUSTNZB_SKIP_FRONTEND_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --locked --all-targets --no-default-features -- -D warnings

      - name: Cargo test
        run: cargo test --locked --no-default-features
